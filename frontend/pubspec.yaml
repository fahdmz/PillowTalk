name: drowzydiary
description: DrowzyDiary — a quiet place to wind down. Voice-first sleep check-ins.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  supabase_flutter: ^2.5.0
  http: ^1.2.0
  flutter_svg: ^2.0.10
  flutter_dotenv: ^5.2.1
  audioplayers: ^6.8.1
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
